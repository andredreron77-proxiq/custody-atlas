name: Playwright

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QA_USER_EMAIL: ${{ secrets.QA_USER_EMAIL }}
      QA_USER_PASSWORD: ${{ secrets.QA_USER_PASSWORD }}
      QA_FRESH_USER_EMAIL: ${{ secrets.QA_FRESH_USER_EMAIL }}
      QA_FRESH_USER_PASSWORD: ${{ secrets.QA_FRESH_USER_PASSWORD }}
      QA_RESET_TOKEN: ${{ secrets.QA_RESET_TOKEN }}
      QA_BASE_URL: ${{ secrets.QA_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run QA suite
        run: npm run qa:all

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            qa/screenshots
